<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VortexDevelopment™</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        (function(){ emailjs.init("blK1IKYjyQ6PuxSvh"); })();
    </script>
    <style>
        body, html { margin: 0; padding: 0; font-family: Arial, sans-serif; height: 100%; overflow: hidden; }
        .video-background { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; object-fit: cover; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .btn { background: #ff9800; color: white; padding: 15px 30px; border: none; cursor: pointer; margin: 5px; border-radius: 5px; }
        .modal { display: none; position: fixed; z-index: 10; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .content { background: white; color: black; margin: 10% auto; padding: 20px; width: 300px; border-radius: 10px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 5px; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline class="video-background">
        <source src="video.mp4" type="video/mp4">
    </video>

    <div class="hero">
        <h1>VortexDevelopment™</h1>
        <button class="btn" onclick="show('authModal')">Register / Login</button>
    </div>

    <div id="authModal" class="modal">
        <div class="content">
            <span onclick="hide('authModal')" style="float:right; cursor:pointer;">&times;</span>
            <div id="authForm">
                <h2>Access</h2>
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="pass" placeholder="Password">
                <button class="btn" onclick="handleAuth('login')">Login</button>
                <button class="btn" onclick="handleAuth('register')">Register</button>
                <p style="cursor:pointer; color:blue;" onclick="forgotPass()">Forgot Password?</p>
            </div>
        </div>
    </div>

    <script>
        function show(id) { document.getElementById(id).style.display = 'block'; }
        function hide(id) { document.getElementById(id).style.display = 'none'; }

        function handleAuth(type) {
            const email = document.getElementById('email').value;
            alert(type + " initiated for: " + email + "\n(Firebase SDK setup required here)");
        }

        function forgotPass() {
            const email = document.getElementById('email').value;
            emailjs.send("service_0jeaxzq", "template_tmaxtx4", { to_email: email });
            alert("Reset link sent to your email!");
        }
    </script>
</body>
</html>
