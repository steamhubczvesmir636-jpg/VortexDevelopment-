<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VortexDevelopment™</title>
    <style>
        /* CSS Styly */
        body, html {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100%;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #1a5f9a; /* Modrá Vortex */
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
            margin: 0;
            padding: 0;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-crew {
            background-color: #ff9800; /* Oranžová */
            color: white !important;
            padding: 10px 20px;
            border-radius: 5px;
        }

        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Zde nahraďte 'pozadi.jpg' cestou k vašemu obrázku */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
        }

        .hero h1 { font-size: 4rem; margin-bottom: 20px; }

        .btn-register {
            background-color: #ff9800;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            font-size: 1.2rem;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">VortexDevelopment™</div>
        <nav>
            <ul>
                <li><a href="#">OUR TEAM</a></li>
                <li><a href="#">POLICIES</a></li>
                <li><a href="#">COMMUNITY</a></li>
                <li><a href="#" class="btn-crew">CREW CENTER</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="hero">
            <h1>Join today!</h1>
            <a href="#" class="btn-register">REGISTER NOW</a>
        </div>
    </main>

</body>
</html>
