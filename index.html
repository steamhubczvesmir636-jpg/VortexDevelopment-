<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VortexDevelopment™</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        (function(){
            emailjs.init("VASE_PUBLIC_KEY"); // ZDE VLOŽTE SVŮJ PUBLIC KEY
        })();
    </script>
    <style>
        body, html { margin: 0; padding: 0; font-family: Arial, sans-serif; height: 100%; overflow: hidden; }

        /* Video na pozadí */
        .video-background { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; object-fit: cover; }

        /* Navigace */
        header { position: relative; z-index: 2; display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; background: rgba(255,255,255,0.9); }
        .logo { font-size: 24px; font-weight: bold; color: #1a5f9a; }
        nav ul { list-style: none; display: flex; gap: 30px; }
        nav a { text-decoration: none; color: #333; font-weight: bold; }
        .btn-crew { background-color: #ff9800; color: white !important; padding: 10px 20px; border-radius: 5px; }

        /* Hero sekce */
        .hero { height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
        .btn-register { background-color: #ff9800; color: white; padding: 15px 30px; text-decoration: none; border-radius: 5px; font-weight: bold; cursor: pointer; border: none; font-size: 1.2rem; }

        /* Modální okno */
        .modal { display: none; position: fixed; z-index: 10; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: white; margin: 10% auto; padding: 30px; width: 300px; border-radius: 10px; animation: slideDown 0.4s; color: #333; text-align: center; }
        @keyframes slideDown { from {transform: translateY(-50px); opacity: 0;} to {transform: translateY(0); opacity: 1;} }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline class="video-background">
        <source src="video.mp4" type="video/mp4">
    </video>

    <header>
        <div class="logo">VortexDevelopment™</div>
        <nav>
            <ul>
                <li><a href="#">OUR TEAM</a></li>
                <li><a href="#">POLICIES</a></li>
                <li><a href="#">COMMUNITY</a></li>
                <li><a href="#" class="btn-crew">CREW CENTER</a></li>
            </ul>
        </nav>
    </header>

    <main class="hero">
        <h1>Join today!</h1>
        <button class="btn-register" onclick="openModal()">REGISTER NOW</button>
    </main>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span style="float:right; cursor:pointer;" onclick="closeModal()">&times;</span>
            <h2>Sign Up</h2>
            <input type="email" id="userEmail" placeholder="Enter your email">
            <button class="btn-register" onclick="sendVerification()">Send Code</button>
            <p id="status"></p>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById('authModal').style.display = 'block'; }
        function closeModal() { document.getElementById('authModal').style.display = 'none'; }

        function sendVerification() {
            const email = document.getElementById('userEmail').value;
            const code = Math.floor(100000 + Math.random() * 900000);
            
            emailjs.send("service_0jeaxzq", "template_6jc2oeh", {
                to_email: email,
                verification_code: code
            }).then(() => {
                document.getElementById('status').innerText = "Verification code sent!";
            }).catch(err => {
                document.getElementById('status').innerText = "Error!";
            });
        }
    </script>

</body>
</html>
