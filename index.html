<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VortexDevelopment™</title>
    <style>
        /* Základní nastavení */
        body, html { 
            margin: 0; 
            padding: 0; 
            font-family: Arial, sans-serif; 
            height: 100%; 
            overflow: hidden; 
        }

        /* Navigace */
        header {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo { font-size: 24px; font-weight: bold; color: #1a5f9a; }

        nav ul { list-style: none; display: flex; gap: 30px; margin: 0; padding: 0; }
        nav a { text-decoration: none; color: #333; font-weight: bold; font-size: 14px; }
        .btn-crew { background-color: #ff9800; color: white !important; padding: 10px 20px; border-radius: 5px; }

        /* Video na pozadí */
        .video-background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        /* Hlavní sekce */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            z-index: 1;
            position: relative;
        }

        .hero h1 { font-size: 4rem; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .btn-register { 
            background-color: #ff9800; 
            color: white; 
            padding: 15px 30px; 
            text-decoration: none; 
            font-size: 1.2rem; 
            border-radius: 5px; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline class="video-background">
        <source src="video.mkv" type="video/mp4">
        Váš prohlížeč nepodporuje video na pozadí.
    </video>

    <header>
        <div class="logo">VortexDevelopment™</div>
        <nav>
            <ul>
                <li><a href="#">OUR TEAM</a></li>
                <li><a href="#">POLICIES</a></li>
                <li><a href="#">COMMUNITY</a></li>
                <li><a href="#" class="btn-crew">CREW CENTER</a></li>
            </ul>
        </nav>
    </header>

    <main class="hero">
        <h1>Join today!</h1>
        <a href="#" class="btn-register">REGISTER NOW</a>
    </main>

</body>
</html>
